<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission</title>
    <link rel="stylesheet" href="admission.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
    <meta http-equiv="X-UA-compatible" content="IE=edge" />

    <!--CSS-link-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100..900&family=Poppins:wght@100..900&display=swap"
        rel="stylesheet" />
</head>

<body>
    <header>

        
        
        <ul class="navmenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Admission</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">SignUp</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
        
        
    </header>

    <div class="top">

        <h1 class="top-text">
            Admission Page
        </h1>
        <p>Apply Here for admission</p>
    </div>
    
    <section class="container">
        <form class="form" action="post">
            <div>
                <label for="">Name : - </label>
                <input type="text" placeholder="enter your name">
            </div>

            <div>
                <label for="">Age : - </label>
                <input type="text" placeholder="enter your Age">
            </div>

            <div class="class">
                <label for=""> Class :-</label>
                <select name="class" id="class">
                    <option value="Class 1 ">Class 1 </option>
                    <option value="Class 2">Class 2</option>
                    <option value="Class 3">Class 3</option>
                    <option value="Class 4">Class 4</option>
                    <option value="Class 5">Class 5</option>
                    <option value="Class 6">Class 6</option>
                    <option value="Class 7">Class 7</option>
                    <option value="Class 8">Class 8</option>
                    <option value="Class 9">Class 9</option>
                    <option value="Class 10">Class 10</option>
                </select>
            </div>

            <div>
                <label for="">Number :-</label>
                <input type="number" name="number" id="number">
            </div>

            <div>
                <label for="">Father's Name :-</label>
                <input type="text" placeholder="enter your father's name">
            </div>

            <div>
                <label for="">Mother's Name :-</label>
                <input type="text" placeholder="enter your mother's name">
            </div>

            <div>
                <label for="">Email :-</label>
                <input type="email" name="email" id="email">
            </div>

            <div>
                <label for="">Previous Class Result :-</label>
                <input class="file" type="file" name="file" id="file">
            </div>

            <div>
                <label for="">Tell about yourself :-</label>
                <br>
                <textarea cols="40" rows="5" name="about" id="about"></textarea>
            </div>

            <div>
                <input class="submit" type="button" value="submit">
            </div>
        </form>
    </section>

    <!-- contact section  -->
    <section class="contact">
        <div class="contact-info">
            <h1>Contact Us</h1>
            <p>Email: kiaanbhatta2@gmail.com</p>
            <p>Phone: 9745584725</p>
        </div>
    </section>

    <div class="end-text">
        <p>Copyright @2026. All Rights Reserved. Designed By Kiaan Bhatta.</p>
    </div>
</body>

</html>
